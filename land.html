<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: darkblue;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 400px;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 70px;
      margin: 10px 0;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: darkblue;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    a:hover {
      background: #ddd;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="icon">🚫</div>
    <h1>404</h1>
    <p>Page Not Found</p>
    <a href="home.html">Go Back Home</a>
  </div>

</body>
</html>
